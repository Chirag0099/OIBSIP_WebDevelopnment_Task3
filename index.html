<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

    <h1>📝 To-Do List</h1>

    <form id="add-form" class="add-form">

        <input
            type="text"
            id="task-input"
            placeholder="What needs doing?"
            autocomplete="off"
            required
        >

        <button type="submit">
            Add Task
        </button>

    </form>

    <div class="columns">

        <!-- Pending -->

        <section class="column">

            <h2>
                Pending
                <span id="pending-count" class="count">
                    0 pending
                </span>
            </h2>

            <ul id="pending-list" class="task-list"></ul>

            <div id="pending-empty" class="empty-state visible">
                Nothing pending — add a task above to get started.
            </div>

        </section>

        <!-- Completed -->

        <section class="column">

            <h2>
                Completed
                <span id="completed-count" class="count">
                    0 completed
                </span>
            </h2>

            <ul id="completed-list" class="task-list"></ul>

            <div id="completed-empty" class="empty-state visible">
                No completed tasks yet.
            </div>

        </section>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
